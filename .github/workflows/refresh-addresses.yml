name: 📇 Refresh Address Feeds

on:
  schedule:
    # Weekly on Sunday 03:00 UTC — upstream OFAC feed is updated as the
    # SDN list changes, and Python stdlib is the only runtime requirement.
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 Refresh OFAC feed
        run: python scripts/refresh_addresses.py

      - name: 📬 Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/refresh-addresses
          title: 'chore: refresh vendored address feeds'
          commit-message: 'chore: refresh vendored address feeds'
          body: |
            Automated weekly sync of `addresses/ofac.json` from
            [ultrasoundmoney/ofac-ethereum-addresses](https://github.com/ultrasoundmoney/ofac-ethereum-addresses) (MIT).

            If only the metadata / sort order changed, close this PR.
          add-paths: addresses/
          delete-branch: true
